<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MIT OpenCourseWare - Zoomable Sunburst</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }
    h1 {
      margin-bottom: 10px;
      font-weight: 300;
      letter-spacing: 2px;
    }
    .description {
      color: #888;
      margin-bottom: 20px;
      font-size: 14px;
    }
    #chart {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      width: 900px;
      height: 900px;
      border-radius: 8px;
    }
    #loading {
      color: #888;
      font-size: 14px;
    }
    svg {
      font: 10px sans-serif;
      background: transparent;
    }
    path {
      cursor: pointer;
    }
    path:hover {
      opacity: 0.8;
    }
    .tooltip {
      position: absolute;
      text-align: center;
      padding: 8px 14px;
      font-size: 13px;
      background: rgba(0, 0, 0, 0.85);
      color: #fff;
      border-radius: 4px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
      max-width: 300px;
      z-index: 10;
    }
    .tooltip.visible {
      opacity: 1;
    }
    .tooltip-title {
      font-weight: bold;
      margin-bottom: 4px;
    }
    .tooltip-details {
      color: #aaa;
      font-size: 11px;
    }
    #center-info {
      position: absolute;
      text-align: center;
      pointer-events: none;
      color: #fff;
      opacity: 0;
      transition: opacity 0.3s;
    }
    #center-info.visible {
      opacity: 1;
    }
    #center-info h2 {
      margin: 0;
      font-size: 18px;
      font-weight: 400;
    }
    #center-info p {
      margin: 5px 0 0;
      color: #888;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <h1>MIT OpenCourseWare</h1>
  <p class="description">Explore the hierarchy of courses by subject area. Click to zoom in, click center to zoom out.</p>
  <div id="chart">
    <div id="loading">Loading course data...</div>
  </div>
  <div id="center-info">
    <h2></h2>
    <p></p>
  </div>
  <div class="tooltip">
    <div class="tooltip-title"></div>
    <div class="tooltip-details"></div>
  </div>

  <script>
    const width = 900;
    const radius = width / 2;

    const color = d3.scaleOrdinal()
      .domain(["1", "10", "11", "12", "14", "15", "16", "18", "21A", "21H", "21M", "21W", "3", "4", "6", "7", "8", "CMS", "CSB", "DWG", "EC", "EM", "ES", "GEO", "HST", "IDS", "MAS", "ME", "MS", "NS", "PE", "PW", "RES", "SCM", "STS", "WGS"])
      .range(d3.schemeCategory10);

    let root, partition, svg, path, label, parent;

    const arc = d3.arc()
      .startAngle(d => d.x0)
      .endAngle(d => d.x1)
      .padAngle(d => Math.min((d.x1 - d.x0) / 2, 0.005))
      .padRadius(radius * 1.5)
      .innerRadius(d => d.y0 * radius / (root.height + 1))
      .outerRadius(d => Math.max(d.y0 * radius / (root.height + 1), d.y1 * radius / (root.height + 1) - 1));

    d3.json("mit-ocw-data.json").then(function(hierarchy) {
      document.getElementById("loading").style.display = "none";

      root = d3.hierarchy(hierarchy)
        .sum(d => d.children ? 0 : 1)
        .sort((a, b) => b.value - a.value);

      partition = d3.partition()
        .size([2 * Math.PI, root.height + 1]);

      partition(root);

      root.each(d => d.current = d);

      svg = d3.select("#chart")
        .append("svg")
        .attr("viewBox", [-width / 2, -width / 2, width, width])
        .style("font", "10px sans-serif");

      path = svg.append("g")
        .selectAll("path")
        .data(root.descendants().slice(1))
        .join("path")
        .attr("fill", d => {
          while (d.depth > 1) d = d.parent;
          return color(d.data.name);
        })
        .attr("fill-opacity", d => arcVisible(d.current) ? (d.children ? 0.8 : 0.6) : 0)
        .attr("pointer-events", d => arcVisible(d.current) ? "auto" : "none")
        .attr("d", d => arc(d.current))
        .style("cursor", "pointer")
        .on("click", clicked);

      label = svg.append("g")
        .attr("pointer-events", "none")
        .attr("text-anchor", "middle")
        .style("user-select", "none")
        .selectAll("text")
        .data(root.descendants().slice(1))
        .join("text")
        .attr("dy", "0.35em")
        .attr("fill-opacity", d => +labelVisible(d.current))
        .attr("transform", d => labelTransform(d.current))
        .text(d => {
          if (d.depth === 3 && d.data.fullTitle) {
            return d.data.fullTitle.length > 15 ? d.data.fullTitle.substring(0, 15) + '...' : d.data.fullTitle;
          }
          return d.data.name;
        })
        .style("font-size", "8px")
        .style("fill", "#fff");

      parent = svg.append("circle")
        .datum(root)
        .attr("r", radius / (root.height + 1))
        .attr("fill", "none")
        .attr("pointer-events", "all")
        .on("click", clicked);

      const tooltip = d3.select(".tooltip");
      const tooltipTitle = d3.select(".tooltip-title");
      const tooltipDetails = d3.select(".tooltip-details");
      const centerInfo = document.getElementById("center-info");
      const centerTitle = centerInfo.querySelector("h2");
      const centerDesc = centerInfo.querySelector("p");

      path.on("mouseover", function(event, d) {
        if (!arcVisible(d.current)) return;
        
        tooltip.classed("visible", true);
        
        if (d.depth === 1) {
          tooltipTitle.text(d.data.title || d.data.name);
          tooltipDetails.text(`${d.children ? d.children.length : 0} courses`);
        } else if (d.depth === 2) {
          tooltipTitle.text(d.data.title || d.data.name);
          tooltipDetails.text(`${d.children ? d.children.length : 0} classes`);
        } else if (d.depth === 3) {
          tooltipTitle.text(d.data.fullTitle || d.data.name);
          tooltipDetails.text(`${d.data.semester || ''} ${d.data.year || ''}`);
        }
      })
      .on("mousemove", function(event) {
        tooltip
          .style("left", (event.pageX + 15) + "px")
          .style("top", (event.pageY - 10) + "px");
      })
      .on("mouseout", function() {
        tooltip.classed("visible", false);
      });

      function clicked(event, p) {
        parent.datum(p.parent || root);

        root.each(d => d.target = {
          x0: Math.max(0, Math.min(1, (d.x0 - p.x0) / (p.x1 - p.x0))) * 2 * Math.PI,
          x1: Math.max(0, Math.min(1, (d.x1 - p.x0) / (p.x1 - p.x0))) * 2 * Math.PI,
          y0: Math.max(0, d.y0 - p.depth),
          y1: Math.max(0, d.y1 - p.depth)
        });

        const t = svg.transition().duration(500);

        path.transition(t)
          .tween("data", d => {
            const i = d3.interpolate(d.current, d.target);
            return t => d.current = i(t);
          })
          .filter(function(d) {
            return +this.getAttribute("fill-opacity") || arcVisible(d.target);
          })
          .attr("fill-opacity", d => arcVisible(d.target) ? (d.children ? 0.8 : 0.6) : 0)
          .attr("pointer-events", d => arcVisible(d.target) ? "auto" : "none")
          .attrTween("d", d => () => arc(d.current));

        label.filter(function(d) {
            return +this.getAttribute("fill-opacity") || labelVisible(d.target);
          }).transition(t)
          .attr("fill-opacity", d => +labelVisible(d.target))
          .attrTween("transform", d => () => labelTransform(d.current));

        if (p.depth === 0) {
          centerTitle.textContent = "MIT OpenCourseWare";
          centerDesc.textContent = "Click a subject to explore";
          centerInfo.classList.add("visible");
        } else if (p.depth === 1) {
          centerTitle.textContent = p.data.title || p.data.name;
          centerDesc.textContent = `${p.children ? p.children.length : 0} hundred ranges`;
          centerInfo.classList.add("visible");
        } else if (p.depth === 2) {
          centerTitle.textContent = p.data.title || p.data.name;
          centerDesc.textContent = `${p.children ? p.children.length : 0} classes - Click to zoom out`;
          centerInfo.classList.add("visible");
        } else if (p.depth === 3) {
          if (p.data.url) {
            window.location.href = p.data.url;
          }
        }
      }

      function arcVisible(d) {
        return d.y1 <= 4 && d.y0 >= 1 && d.x1 > d.x0;
      }

      function labelVisible(d) {
        return d.y1 <= 4 && d.y0 >= 1 && (d.y1 - d.y0) * (d.x1 - d.x0) > 0.01;
      }

      function labelTransform(d) {
        const x = (d.x0 + d.x1) / 2 * 180 / Math.PI;
        const y = (d.y0 + d.y1) / 2 * radius / (root.height + 1);
        // All labels horizontal radiating outward
        return `translate(${y},0)`;
      }

      document.addEventListener("click", function(event) {
        if (!event.target.closest("svg")) {
          parent.datum(root);
          const t = svg.transition().duration(500);
          root.each(d => d.target = {
            x0: d.x0,
            x1: d.x1,
            y0: d.y0,
            y1: d.y1
          });

          path.transition(t)
            .tween("data", d => {
              const i = d3.interpolate(d.current, d.target);
              return t => d.current = i(t);
            })
            .filter(function(d) {
              return +this.getAttribute("fill-opacity") || arcVisible(d.target);
            })
            .attr("fill-opacity", d => arcVisible(d.target) ? (d.children ? 0.8 : 0.6) : 0)
            .attr("pointer-events", d => arcVisible(d.target) ? "auto" : "none")
            .attrTween("d", d => () => arc(d.current));

          label.filter(function(d) {
              return +this.getAttribute("fill-opacity") || labelVisible(d.target);
            }).transition(t)
            .attr("fill-opacity", d => +labelVisible(d.target))
            .attrTween("transform", d => () => labelTransform(d.current));

          centerInfo.classList.remove("visible");
        }
      });
    }).catch(function(error) {
      document.getElementById("loading").textContent = "Error loading data: " + error.message;
    });
  </script>
</body>
</html>
